networks:
  traefik:
    name: traefik-net
    external: true
  internal:
    internal: true

volumes:
  redis_data:
  huggingface_cache:

services:
  api:
    container_name: api-rag

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api-rag.rule=Host(`api-rag-dev.frba.utn.edu.ar`)"
      - "traefik.http.routers.api-rag.entrypoints=websecure"
      - "traefik.http.routers.api-rag.tls=true"
      - "traefik.http.services.api-rag.loadbalancer.server.port=8000"

    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    networks:
      - traefik
      - internal
    depends_on:
      - redis
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - huggingface_cache:/root/.cache/huggingface
      - ./app:/app/app
    ports:
      - "8000:8000"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis-rag
    networks:
      - internal
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning
    restart: unless-stopped
