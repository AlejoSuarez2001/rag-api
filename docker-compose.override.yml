networks:
  traefik:
    name: traefik-net
    external: true
  internal:
    internal: true

volumes:
  redis_data:

services:
  api:
    container_name: api-rag

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api-rag.rule=Host(`api-rag-dev.frba.utn.edu.ar`)"
      - "traefik.http.routers.api-rag.entrypoints=websecure"
      - "traefik.http.routers.api-rag.tls=true"
      - "traefik.http.services.api-rag.loadbalancer.server.port=8000"

    env_file: .env.dev
    networks:
      - traefik
      - internal
    depends_on:
      - redis
    command: sh entrypoint.sh
    volumes:
      - ./app:/app/app
    ports:
      - "8000:8000"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis-rag
    networks:
      - internal
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning
    restart: unless-stopped
