networks:
  traefik:
    name: traefik-net
    external: true

volumes:
  redis_data:
  huggingface_cache:

services:
  api:
    container_name: api-rag
    image: registry.frba.utn.edu.ar/prd/api-rag

    networks:
      - traefik

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api-rag.rule=Host(`api-rag-tst.frba.utn.edu.ar`)"
      - "traefik.http.services.api-rag.loadbalancer.server.port=8000"

    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    depends_on:
      - redis
    volumes:
      - huggingface_cache:/root/.cache/huggingface
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis-rag
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning
    restart: unless-stopped
