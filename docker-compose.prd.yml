networks:
  traefik:
    name: traefik-net
    external: true
  internal:
    internal: true

volumes:
  redis_data:

services:
  api:
    container_name: api-rag
    image: registry.frba.utn.edu.ar/prd/api-rag:prd

    networks:
      - traefik
      - internal

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api-rag.rule=Host(`api-rag.frba.utn.edu.ar`)"
      - "traefik.http.services.api-rag.loadbalancer.server.port=8000"

    env_file: .env
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis-rag
    networks:
      - internal
    volumes:
      - redis_data:/data
    command: redis-server \
      --appendonly yes \
      --appendfsync everysec \
      --loglevel warning
    restart: unless-stopped
